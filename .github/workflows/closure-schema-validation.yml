name: Closure schema validation

on:
  pull_request:
    paths:
      - "docs/contracts/CAT-CON-001-Engineering-Closure-Metadata-Contract.md"
      - "schemas/catalyst/engineering-closure-v1.schema.json"
      - "examples/closure/**"
      - "scripts/validate_closure_schema.py"
      - ".github/workflows/closure-schema-validation.yml"
  push:
    branches:
      - main
    paths:
      - "docs/contracts/CAT-CON-001-Engineering-Closure-Metadata-Contract.md"
      - "schemas/catalyst/engineering-closure-v1.schema.json"
      - "examples/closure/**"
      - "scripts/validate_closure_schema.py"
      - ".github/workflows/closure-schema-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator
        run: python -m pip install --disable-pip-version-check "jsonschema==4.23.0"

      - name: Validate closure fixtures
        run: python scripts/validate_closure_schema.py
